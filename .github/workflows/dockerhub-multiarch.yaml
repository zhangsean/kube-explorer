name: Docker Hub Multi-Arch

on:
  push:
    branches:
      - "**"
  release:
    types:
      - published

env:
  IMAGE_NAME: zhangsean/kube-explorer
  UPX_VERSION: 4.2.4

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install UPX
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz" -o /tmp/upx.tar.xz
          tar -xJf /tmp/upx.tar.xz -C /tmp
          sudo install -m 0755 "/tmp/upx-${UPX_VERSION}-amd64_linux/upx" /usr/local/bin/upx
          upx --version

      - name: Build and compress Linux binaries
        run: |
          set -euo pipefail
          mkdir -p package dist

          VERSION="${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}"
          COMMIT="${GITHUB_SHA}"
          LDFLAGS="-s -w -buildid= -X github.com/cnrancher/kube-explorer/internal/version.Version=${VERSION} -X github.com/cnrancher/kube-explorer/internal/version.GitCommit=${COMMIT}"

          for arch in amd64 arm64; do
            output="package/kube-explorer-linux-${arch}"
            echo "==> Building linux/${arch}: ${output}"
            CGO_ENABLED=0 GOOS=linux GOARCH="${arch}" \
              go build -p 1 -tags embed -trimpath -ldflags "${LDFLAGS}" -o "${output}" .

            echo "==> UPX compressing linux/${arch}: ${output}"
            upx --best --lzma "${output}"

            cp "${output}" "dist/kube-explorer-linux-${arch}.upx"
          done

          ls -lh package/kube-explorer-linux-*
          ls -lh dist/kube-explorer-linux-*.upx

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD || secrets.DOCKER_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::Docker Hub credentials are missing. Configure repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN, or DOCKER_USERNAME and DOCKER_PASSWORD."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD || secrets.DOCKER_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: package
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: true

      - name: Upload compressed binaries to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/kube-explorer-linux-*.upx
